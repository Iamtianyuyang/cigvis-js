<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIGVis - 3D Volume Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Times New Roman', Georgia, serif;
      background: #ffffff;
      color: #000000;
    }
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 18px; font-weight: bold; }
    .back { color: #000; text-decoration: none; font-size: 13px; }
    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      height: calc(100vh - 57px);
    }
    .viewer {
      position: relative;
    }
    .viewer canvas {
      width: 100%;
      height: 100%;
    }
    .sidebar {
      background: #fafafa;
      border-left: 1px solid #000;
      overflow-y: auto;
      padding: 16px;
    }
    .section {
      margin-bottom: 24px;
    }
    .section-title {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #444;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 0.5pt solid #ccc;
    }
    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .control-label {
      font-size: 12px;
      color: #444;
    }
    .control-value {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #1d4e89;
      min-width: 40px;
      text-align: right;
    }
    input[type="range"] {
      flex: 1;
      margin: 0 12px;
      accent-color: #1d4e89;
    }
    select {
      width: 100%;
      padding: 8px;
      background: #ffffff;
      border: 0.5pt solid #888;
      border-radius: 3px;
      color: #000;
      font-size: 12px;
      font-family: 'Times New Roman', Georgia, serif;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .checkbox-row input[type="checkbox"] {
      accent-color: #1d4e89;
    }
    .checkbox-row label {
      font-size: 12px;
      color: #444;
    }
    .colorbar {
      margin-top: 16px;
    }
    .colorbar-title {
      font-size: 11px;
      color: #444;
      text-align: center;
      margin-bottom: 4px;
    }
    .colorbar-bar {
      height: 120px;
      border-radius: 2px;
      border: 0.5pt solid #000;
    }
    .colorbar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #888;
      margin-top: 4px;
    }
    .info {
      font-size: 11px;
      color: #888;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href="../index.html">← Back</a>
    <h1>3D Volume Visualization</h1>
    <div></div>
  </div>

  <div class="layout">
    <div class="viewer" id="viewer"></div>

    <div class="sidebar">
      <div class="section">
        <div class="section-title">Slice Position</div>
        <div class="control-row">
          <span class="control-label">Inline (X)</span>
          <input type="range" id="slice-x" min="0" max="1" step="0.01" value="0.5">
          <span class="control-value" id="val-x">0.50</span>
        </div>
        <div class="control-row">
          <span class="control-label">Crossline (Y)</span>
          <input type="range" id="slice-y" min="0" max="1" step="0.01" value="0.5">
          <span class="control-value" id="val-y">0.50</span>
        </div>
        <div class="control-row">
          <span class="control-label">Time (Z)</span>
          <input type="range" id="slice-z" min="0" max="1" step="0.01" value="0.5">
          <span class="control-value" id="val-z">0.50</span>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Visibility</div>
        <div class="checkbox-row">
          <input type="checkbox" id="show-x" checked>
          <label for="show-x">X Slice</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="show-y" checked>
          <label for="show-y">Y Slice</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="show-z" checked>
          <label for="show-z">Z Slice</label>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Colormap</div>
        <select id="colormap">
          <option value="gray">Gray</option>
          <option value="petrel" selected>Petrel</option>
          <option value="seismic">Seismic</option>
          <option value="jet">Jet</option>
          <option value="viridis">Viridis</option>
        </select>
      </div>

      <div class="section">
        <div class="colorbar">
          <div class="colorbar-title">Amplitude</div>
          <div class="colorbar-bar" id="colorbar"></div>
          <div class="colorbar-labels">
            <span>-1.0</span>
            <span>0.0</span>
            <span>1.0</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Controls</div>
        <div class="info">
          <strong>Mouse:</strong><br>
          • Left drag: Rotate<br>
          • Right drag: Pan<br>
          • Scroll: Zoom
        </div>
      </div>

      <div class="section">
        <div class="section-title">Volume Info</div>
        <div class="info">
          Shape: 64 × 64 × 64<br>
          Type: Float32<br>
          Size: 1.0 MB
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="cigvis-3d.browser.js"></script>
  <script>
    // Initialize viewer
    const container = document.getElementById('viewer');
    const viewer = new CigVis3D.Viewer(container);

    // Generate sample data
    const shape = [64, 64, 64];
    const volumeData = CigVis3D.generateVolume(shape[0], shape[1], shape[2]);

    // Create slices
    viewer.createSlices(volumeData, shape, {
      x: 0.5,
      y: 0.5,
      z: 0.5,
    });

    // Wire up controls
    ['x', 'y', 'z'].forEach(axis => {
      const slider = document.getElementById(`slice-${axis}`);
      const value = document.getElementById(`val-${axis}`);

      slider.addEventListener('input', () => {
        const pos = parseFloat(slider.value);
        value.textContent = pos.toFixed(2);
        viewer.setSlicePosition(axis, pos);
      });

      const checkbox = document.getElementById(`show-${axis}`);
      checkbox.addEventListener('change', () => {
        viewer.setSliceVisibility(axis, checkbox.checked);
      });
    });

    // Colormap
    document.getElementById('colormap').addEventListener('change', (e) => {
      viewer.setColormap(e.target.value);
    });

    // Update colorbar
    function updateColorbar(cmap) {
      const el = document.getElementById('colorbar');
      const gradients = {
        gray: '#000000, #ffffff',
        petrel: '#0000ff, #00ffff, #00ff00, #ffff00, #ff0000',
        seismic: '#0000b2, #80ffff, #ffffff, #ffff80, #b20000',
        jet: '#000080, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000, #800000',
        viridis: '#440154, #31688e, #35b779, #fde725',
      };
      el.style.background = `linear-gradient(to top, ${gradients[cmap] || gradients.petrel})`;
    }

    updateColorbar('petrel');
    document.getElementById('colormap').addEventListener('change', (e) => {
      updateColorbar(e.target.value);
    });
  </script>
</body>
</html>
