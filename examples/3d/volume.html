<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIGVis — 3D Volume Visualization</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #0a0c10;
      --bg-base: #0f1117;
      --bg-raised: #161922;
      --border-subtle: rgba(255,255,255,0.06);
      --text-primary: #e8eaed;
      --text-secondary: #8b8fa3;
      --text-tertiary: #5c6078;
      --accent: #00d4aa;
      --accent-dim: rgba(0,212,170,0.12);
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-sans); background: var(--bg-void); color: var(--text-primary); min-height: 100dvh; padding: 24px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .breadcrumb { font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary); }
    .breadcrumb a { color: var(--accent); text-decoration: none; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); overflow: hidden; }
    .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-family: var(--font-mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); }
    .card-badge { font-family: var(--font-mono); font-size: 10px; color: var(--accent); padding: 2px 8px; background: var(--accent-dim); border-radius: 999px; }
    .card-body { padding: 16px; }
    .viewer { width: 100%; height: 400px; background: var(--bg-void); border-radius: var(--radius-md); border: 1px solid var(--border-subtle); position: relative; overflow: hidden; }
    .controls { position: absolute; bottom: 12px; left: 12px; display: flex; gap: 8px; }
    .control-btn { padding: 4px 8px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: var(--text-secondary); font-family: var(--font-mono); font-size: 10px; cursor: pointer; }
    .control-btn:hover { background: rgba(0,0,0,0.8); color: var(--text-primary); }
    .control-btn.active { border-color: var(--accent); color: var(--accent); }
    .info { margin-top: 12px; font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); display: flex; gap: 16px; }
    .info span { color: var(--text-secondary); }
    .full-width { grid-column: 1 / -1; }
    .slice-controls { display: flex; gap: 16px; margin-top: 12px; }
    .slice-control { flex: 1; }
    .slice-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-bottom: 4px; }
    .slice-slider { width: 100%; accent-color: var(--accent); }
    .slice-value { font-family: var(--font-mono); font-size: 10px; color: var(--accent); }
  </style>
</head>
<body>
  <div class="header">
    <h1>3D Volume Visualization</h1>
    <span class="breadcrumb"><a href="../index.html">examples</a> / 3d / volume</span>
  </div>

  <div class="grid">
    <!-- Volume Slices -->
    <div class="card full-width">
      <div class="card-header">
        <span class="card-title">Volume Slices</span>
        <span class="card-badge">createSlices</span>
      </div>
      <div class="card-body">
        <div class="viewer" id="slice-viewer">
          <canvas id="slice-canvas"></canvas>
          <div class="controls">
            <button class="control-btn active" data-axis="x">X</button>
            <button class="control-btn active" data-axis="y">Y</button>
            <button class="control-btn active" data-axis="z">Z</button>
          </div>
        </div>
        <div class="slice-controls">
          <div class="slice-control">
            <div class="slice-label">Inline (X)</div>
            <input type="range" class="slice-slider" id="slice-x" min="0" max="63" value="32">
            <div class="slice-value" id="slice-x-val">32</div>
          </div>
          <div class="slice-control">
            <div class="slice-label">Crossline (Y)</div>
            <input type="range" class="slice-slider" id="slice-y" min="0" max="63" value="32">
            <div class="slice-value" id="slice-y-val">32</div>
          </div>
          <div class="slice-control">
            <div class="slice-label">Time (Z)</div>
            <input type="range" class="slice-slider" id="slice-z" min="0" max="63" value="32">
            <div class="slice-value" id="slice-z-val">32</div>
          </div>
        </div>
        <div class="info">
          <div>Volume: <span>64 × 64 × 64</span></div>
          <div>Colormap: <span>petrel</span></div>
          <div>Slices: <span>3 orthogonal</span></div>
        </div>
      </div>
    </div>

    <!-- Surface -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Surface</span>
        <span class="card-badge">createSurfaces</span>
      </div>
      <div class="card-body">
        <div class="viewer">
          <canvas id="surface-canvas"></canvas>
        </div>
        <div class="info">
          <div>Type: <span>Depth horizon</span></div>
        </div>
      </div>
    </div>

    <!-- Well Log -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Well Log</span>
        <span class="card-badge">createWellLog</span>
      </div>
      <div class="card-body">
        <div class="viewer">
          <canvas id="welllog-canvas"></canvas>
        </div>
        <div class="info">
          <div>Style: <span>Tubes</span></div>
          <div>Values: <span>Gamma Ray</span></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/test-data.js"></script>
  <script>
    // ================================================================
    // Colormap helper
    // ================================================================
    function petrelColormap(t) {
      const r = Math.min(1, Math.max(0, t * 2 - 0.5));
      const g = Math.min(1, Math.max(0, 1 - Math.abs(t - 0.5) * 2));
      const b = Math.min(1, Math.max(0, 0.5 - t * 2 + 1));
      return [r * 255, g * 255, b * 255];
    }

    // ================================================================
    // Volume Slice Renderer
    // ================================================================
    class SliceRenderer {
      constructor(canvasId, volume, shape) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.volume = volume;
        this.shape = shape;
        this.sliceX = 32;
        this.sliceY = 32;
        this.sliceZ = 32;
        this.visibleAxes = { x: true, y: true, z: true };
        this.resize();
      }

      resize() {
        const parent = this.canvas.parentElement;
        this.canvas.width = parent.clientWidth;
        this.canvas.height = parent.clientHeight;
        this.render();
      }

      render() {
        const { ctx, canvas } = this;
        const w = canvas.width;
        const h = canvas.height;
        const [ni, nx, nt] = this.shape;

        ctx.fillStyle = '#0a0c10';
        ctx.fillRect(0, 0, w, h);

        // Draw grid
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 1;
        for (let x = 0; x < w; x += 40) {
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
        }
        for (let y = 0; y < h; y += 40) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        }

        const scale = Math.min(w, h) * 0.7;
        const cx = w / 2;
        const cy = h / 2;

        // Draw slices as colored rectangles in 3D projection
        if (this.visibleAxes.z) this.drawSliceZ(cx, cy, scale, ni, nx, nt);
        if (this.visibleAxes.y) this.drawSliceY(cx, cy, scale, ni, nx, nt);
        if (this.visibleAxes.x) this.drawSliceX(cx, cy, scale, ni, nx, nt);

        // Draw axis labels
        ctx.fillStyle = '#5c6078';
        ctx.font = '10px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('Inline (X)', cx + scale * 0.5, cy + scale * 0.5 + 20);
        ctx.fillText('Crossline (Y)', cx - scale * 0.5, cy + scale * 0.5 + 20);
        ctx.fillText('Time (Z)', cx - scale * 0.5 - 20, cy - scale * 0.3);
      }

      drawSliceZ(cx, cy, scale, ni, nx, nt) {
        const { ctx, volume } = this;
        const z = this.sliceZ;
        const size = scale * 0.6;

        for (let i = 0; i < ni; i++) {
          for (let j = 0; j < nx; j++) {
            const val = volume[i * nx * nt + j * nt + z];
            const t = (val + 1) / 2;
            const [r, g, b] = petrelColormap(t);

            const x = cx + (i / ni - 0.5) * size;
            const y = cy + (j / nx - 0.5) * size;
            const cellW = size / ni;
            const cellH = size / nx;

            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(x, y, cellW + 1, cellH + 1);
          }
        }
      }

      drawSliceX(cx, cy, scale, ni, nx, nt) {
        const { ctx, volume } = this;
        const x = this.sliceX;
        const size = scale * 0.6;

        for (let j = 0; j < nx; j++) {
          for (let k = 0; k < nt; k++) {
            const val = volume[x * nx * nt + j * nt + k];
            const t = (val + 1) / 2;
            const [r, g, b] = petrelColormap(t);

            const px = cx + (j / nx - 0.5) * size;
            const py = cy - scale * 0.3 + (k / nt) * size * 0.6;
            const cellW = size / nx;
            const cellH = (size * 0.6) / nt;

            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(px, py, cellW + 1, cellH + 1);
          }
        }
      }

      drawSliceY(cx, cy, scale, ni, nx, nt) {
        const { ctx, volume } = this;
        const y = this.sliceY;
        const size = scale * 0.6;

        for (let i = 0; i < ni; i++) {
          for (let k = 0; k < nt; k++) {
            const val = volume[i * nx * nt + y * nt + k];
            const t = (val + 1) / 2;
            const [r, g, b] = petrelColormap(t);

            const px = cx - scale * 0.3 + (i / ni) * size * 0.6;
            const py = cy - scale * 0.3 + (k / nt) * size * 0.6;
            const cellW = (size * 0.6) / ni;
            const cellH = (size * 0.6) / nt;

            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(px, py, cellW + 1, cellH + 1);
          }
        }
      }

      setSlice(axis, value) {
        this[`slice${axis.toUpperCase()}`] = value;
        this.render();
      }

      toggleAxis(axis) {
        this.visibleAxes[axis] = !this.visibleAxes[axis];
        this.render();
      }
    }

    // ================================================================
    // Surface Renderer
    // ================================================================
    function renderSurface(canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.parentElement.clientWidth;
      const h = canvas.height = canvas.parentElement.clientHeight;

      ctx.fillStyle = '#0a0c10';
      ctx.fillRect(0, 0, w, h);

      const surface = TestData.generateSurface(64, 64, 32);
      const scale = Math.min(w, h) * 0.7;
      const cx = w / 2;
      const cy = h / 2;

      // Draw as 3D surface
      for (let i = 0; i < 63; i++) {
        for (let j = 0; j < 63; j++) {
          const x1 = cx + (i / 64 - 0.5) * scale;
          const y1 = cy + (j / 64 - 0.5) * scale;
          const z1 = surface[i * 64 + j] / 64;

          const x2 = cx + ((i + 1) / 64 - 0.5) * scale;
          const y2 = cy + (j / 64 - 0.5) * scale;
          const z2 = surface[(i + 1) * 64 + j] / 64;

          const x3 = cx + ((i + 1) / 64 - 0.5) * scale;
          const y3 = cy + ((j + 1) / 64 - 0.5) * scale;
          const z3 = surface[(i + 1) * 64 + j + 1] / 64;

          const x4 = cx + (i / 64 - 0.5) * scale;
          const y4 = cy + ((j + 1) / 64 - 0.5) * scale;
          const z4 = surface[i * 64 + j + 1] / 64;

          // Simple 3D projection
          const px1 = x1 - z1 * 20;
          const py1 = y1 - z1 * 20;
          const px2 = x2 - z2 * 20;
          const py2 = y2 - z2 * 20;
          const px3 = x3 - z3 * 20;
          const py3 = y3 - z3 * 20;
          const px4 = x4 - z4 * 20;
          const py4 = y4 - z4 * 20;

          ctx.beginPath();
          ctx.moveTo(px1, py1);
          ctx.lineTo(px2, py2);
          ctx.lineTo(px3, py3);
          ctx.lineTo(px4, py4);
          ctx.closePath();

          const depth = (z1 + z2 + z3 + z4) / 4;
          const [r, g, b] = petrelColormap(depth);
          ctx.fillStyle = `rgba(${r},${g},${b},0.8)`;
          ctx.fill();
          ctx.strokeStyle = `rgba(${r},${g},${b},0.3)`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    // ================================================================
    // Well Log Renderer
    // ================================================================
    function renderWellLog(canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.parentElement.clientWidth;
      const h = canvas.height = canvas.parentElement.clientHeight;

      ctx.fillStyle = '#0a0c10';
      ctx.fillRect(0, 0, w, h);

      const { trajectory, values } = TestData.generateWellLog(100);
      const scale = Math.min(w, h) * 0.7;
      const cx = w / 2;
      const cy = h / 2;

      // Draw well trajectory as tube
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      for (let i = 0; i < trajectory.length / 3 - 1; i++) {
        const x1 = trajectory[i * 3] / 64;
        const y1 = trajectory[i * 3 + 1] / 64;
        const z1 = trajectory[i * 3 + 2] / 64;
        const x2 = trajectory[(i + 1) * 3] / 64;
        const y2 = trajectory[(i + 1) * 3 + 1] / 64;
        const z2 = trajectory[(i + 1) * 3 + 2] / 64;

        const px1 = cx + (x1 - 0.5) * scale - z1 * 30;
        const py1 = cy + (y1 - 0.5) * scale - z1 * 30;
        const px2 = cx + (x2 - 0.5) * scale - z2 * 30;
        const py2 = cy + (y2 - 0.5) * scale - z2 * 30;

        const val = values[i] / 50;
        const [r, g, b] = petrelColormap(val);

        ctx.beginPath();
        ctx.moveTo(px1, py1);
        ctx.lineTo(px2, py2);
        ctx.strokeStyle = `rgb(${r},${g},${b})`;
        ctx.stroke();
      }

      // Draw start marker
      const startX = cx + (trajectory[0] / 64 - 0.5) * scale;
      const startY = cy + (trajectory[1] / 64 - 0.5) * scale;
      ctx.beginPath();
      ctx.arc(startX, startY, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#00d4aa';
      ctx.fill();
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // ================================================================
    // Initialize
    // ================================================================
    const { data: volume, shape } = TestData.generateVolume(64, 64, 64);
    const sliceRenderer = new SliceRenderer('slice-canvas', volume, shape);

    // Wire up controls
    document.getElementById('slice-x').addEventListener('input', (e) => {
      sliceRenderer.setSlice('x', parseInt(e.target.value));
      document.getElementById('slice-x-val').textContent = e.target.value;
    });
    document.getElementById('slice-y').addEventListener('input', (e) => {
      sliceRenderer.setSlice('y', parseInt(e.target.value));
      document.getElementById('slice-y-val').textContent = e.target.value;
    });
    document.getElementById('slice-z').addEventListener('input', (e) => {
      sliceRenderer.setSlice('z', parseInt(e.target.value));
      document.getElementById('slice-z-val').textContent = e.target.value;
    });

    document.querySelectorAll('[data-axis]').forEach(btn => {
      btn.addEventListener('click', () => {
        sliceRenderer.toggleAxis(btn.dataset.axis);
        btn.classList.toggle('active');
      });
    });

    // Render other views
    renderSurface('surface-canvas');
    renderWellLog('welllog-canvas');

    // Handle resize
    window.addEventListener('resize', () => {
      sliceRenderer.resize();
      renderSurface('surface-canvas');
      renderWellLog('welllog-canvas');
    });
  </script>
</body>
</html>
