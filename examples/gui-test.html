<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIGVis — GUI Components</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-raised: #fafafa;
      --bg-surface: #f0f0f0;
      --border: #000;
      --border-soft: #ccc;
      --text: #000;
      --text-2: #444;
      --text-3: #888;
      --accent: #1d4e89;
      --accent-dim: rgba(29,78,137,0.06);
      --serif: 'Times New Roman', Georgia, serif;
      --mono: 'Courier New', monospace;
      --r-md: 3px;
      --r-lg: 4px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--serif);
      background: var(--bg);
      color: var(--text);
    }

    /* Topbar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 48px;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .logo { display: flex; align-items: center; gap: 6px; }
    .logo-mark {
      width: 16px; height: 16px;
      border: 1.5px solid var(--text);
      border-radius: 2px;
    }
    .logo-text { font-family: var(--mono); font-weight: bold; font-size: 13px; }
    .topbar-status {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    /* Layout */
    .layout { display: grid; grid-template-columns: 1fr 280px; height: calc(100vh - 48px); }

    /* Main */
    .main {
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Section */
    .section {
      background: var(--bg);
      border: 0.5pt solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .section-head {
      padding: 10px 16px;
      border-bottom: 0.5pt solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-2);
    }
    .section-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      padding: 2px 8px;
      background: var(--accent-dim);
      border-radius: 999px;
    }
    .section-body { padding: 16px; }

    /* Form row */
    .form-row {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
    }
    .form-row + .form-row { border-top: 0.5pt solid var(--border-soft); }
    .form-label { font-size: 12px; color: var(--text-2); }
    .form-value {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-3);
      text-align: right;
      min-width: 40px;
    }

    /* Button row */
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    /* Event log */
    .event-log {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      padding: 8px 12px;
      background: var(--bg-raised);
      border-radius: var(--r-md);
      border: 0.5pt solid var(--border-soft);
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .event-time { color: var(--text-3); }
    .event-type { color: var(--accent); }
    .event-data { color: var(--text-2); }

    /* Plot area */
    .plot-frame {
      background: var(--bg);
      border: 0.5pt solid var(--border);
      border-radius: var(--r-md);
      height: 240px;
      position: relative;
      overflow: hidden;
    }
    .plot-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, var(--border-soft) 1px, transparent 1px),
        linear-gradient(0deg, var(--border-soft) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-raised);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* Statusbar */
    .statusbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 28px;
      background: var(--bg-raised);
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
    }
    .statusbar-group { display: flex; gap: 16px; }
    .status-ok { color: var(--accent); }
    .status-warn { color: #b8860b; }
    .status-err { color: #a33; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <div class="logo-mark"></div>
        <span class="logo-text">cigvis</span>
      </div>
    </div>
    <div class="topbar-status">
      <span class="dot"></span>
      <span>Components</span>
    </div>
  </div>

  <div class="layout">
    <div class="main">
      <!-- RangeSlider -->
      <div class="section">
        <div class="section-head">
          <span class="section-title">Range Slider</span>
          <span class="section-badge">3</span>
        </div>
        <div class="section-body">
          <div class="form-row">
            <span class="form-label">Opacity</span>
            <cigvis-range-slider label="" value="75" min="0" max="100"></cigvis-range-slider>
            <span class="form-value" data-slider="opacity">75</span>
          </div>
          <div class="form-row">
            <span class="form-label">Zero test</span>
            <cigvis-range-slider label="" value="0" min="0" max="50"></cigvis-range-slider>
            <span class="form-value" data-slider="zero">0</span>
          </div>
          <div class="form-row">
            <span class="form-label">Step size</span>
            <cigvis-range-slider label="" value="50" min="0" max="100" step="10"></cigvis-range-slider>
            <span class="form-value" data-slider="step">50</span>
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="section">
        <div class="section-head">
          <span class="section-title">Buttons</span>
          <span class="section-badge">3 variants</span>
        </div>
        <div class="section-body">
          <div class="btn-row">
            <cigvis-button label="Primary" variant="primary"></cigvis-button>
            <cigvis-button label="Secondary" variant="secondary"></cigvis-button>
            <cigvis-button label="Ghost" variant="ghost"></cigvis-button>
          </div>
          <div style="margin-top: 12px;">
            <div class="event-log" id="btn-log">
              <span class="event-type">ready</span>
              <span class="event-data">awaiting interaction</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Dropdown -->
      <div class="section">
        <div class="section-head">
          <span class="section-title">Dropdown</span>
          <span class="section-badge">2</span>
        </div>
        <div class="section-body">
          <div class="form-row">
            <span class="form-label">Colormap</span>
            <cigvis-dropdown-select label="" value="petrel"></cigvis-dropdown-select>
            <span class="form-value" data-dd="cmap">petrel</span>
          </div>
          <div class="form-row">
            <span class="form-label">Interpolation</span>
            <cigvis-dropdown-select label="" value="linear"></cigvis-dropdown-select>
            <span class="form-value" data-dd="interp">linear</span>
          </div>
        </div>
      </div>

      <!-- Plot -->
      <div class="section">
        <div class="section-head">
          <span class="section-title">Plot Canvas</span>
          <span class="section-badge">live</span>
        </div>
        <div class="section-body">
          <div class="plot-frame">
            <cigvis-plot-canvas id="canvas" style="position:absolute;inset:0;"></cigvis-plot-canvas>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="section" style="border-radius:0;border:none;border-bottom:1px solid var(--border);">
        <div class="section-head">
          <span class="section-title">Colormap</span>
        </div>
        <div class="section-body" style="padding: 8px;">
          <cigvis-colormap-picker selected="petrel"></cigvis-colormap-picker>
        </div>
      </div>

      <div class="section" style="border-radius:0;border:none;border-bottom:1px solid var(--border);">
        <div class="section-head">
          <span class="section-title">Slice Position</span>
        </div>
        <div class="section-body">
          <div class="form-row" style="grid-template-columns: 20px 1fr auto;">
            <span class="form-label" style="font-family:var(--mono);font-weight:600;color:var(--accent);">X</span>
            <cigvis-range-slider label="" value="96" min="0" max="192"></cigvis-range-slider>
            <span class="form-value">96</span>
          </div>
          <div class="form-row" style="grid-template-columns: 20px 1fr auto;">
            <span class="form-label" style="font-family:var(--mono);font-weight:600;color:var(--accent);">Y</span>
            <cigvis-range-slider label="" value="100" min="0" max="200"></cigvis-range-slider>
            <span class="form-value">100</span>
          </div>
          <div class="form-row" style="grid-template-columns: 20px 1fr auto;">
            <span class="form-label" style="font-family:var(--mono);font-weight:600;color:var(--accent);">Z</span>
            <cigvis-range-slider label="" value="120" min="0" max="240"></cigvis-range-slider>
            <span class="form-value">120</span>
          </div>
        </div>
      </div>

      <div class="section" style="border-radius:0;border:none;border-bottom:1px solid var(--border);">
        <div class="section-head">
          <span class="section-title">Actions</span>
        </div>
        <div class="section-body" style="display:flex;flex-direction:column;gap:8px;">
          <cigvis-button label="Reset View" variant="secondary" style="width:100%;"></cigvis-button>
          <cigvis-button label="Export PNG" variant="primary" style="width:100%;"></cigvis-button>
        </div>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <div class="statusbar-group">
      <span>Components: <span class="status-ok" id="comp-count">—</span></span>
      <span>Errors: <span class="status-ok" id="err-count">0</span></span>
    </div>
    <div class="statusbar-group">
      <span>WebGL: <span id="webgl">—</span></span>
    </div>
  </div>

  <script src="cigvis-gui.browser.js"></script>
  <script>
    // Component count
    const names = ['cigvis-range-slider','cigvis-button','cigvis-dropdown-select',
                   'cigvis-plot-canvas','cigvis-colormap-picker','cigvis-sidebar','cigvis-sidebar-section'];
    let ok = 0;
    for (const n of names) if (customElements.get(n)) ok++;
    document.getElementById('comp-count').textContent = `${ok}/${names.length}`;

    // WebGL check
    try {
      const c = document.createElement('canvas');
      const g = c.getContext('webgl') || c.getContext('webgl2');
      const el = document.getElementById('webgl');
      el.textContent = g ? 'ok' : 'n/a';
      el.className = g ? 'status-ok' : 'status-warn';
    } catch(e) {}

    // Dropdown options
    const cmapSel = document.querySelector('.main cigvis-dropdown-select[value="petrel"]');
    if (cmapSel) cmapSel.setOptions([
      {value:'petrel',label:'Petrel'},{value:'gray',label:'Gray'},
      {value:'jet',label:'Jet'},{value:'viridis',label:'Viridis'},
    ]);
    const interpSel = document.querySelector('.main cigvis-dropdown-select[value="linear"]');
    if (interpSel) interpSel.setOptions([
      {value:'nearest',label:'Nearest'},{value:'linear',label:'Linear'},{value:'cubic',label:'Cubic'},
    ]);

    // Slider events
    document.querySelectorAll('cigvis-range-slider').forEach(s => {
      s.addEventListener('change', e => {
        const row = s.closest('.form-row');
        if (row) { const v = row.querySelector('.form-value'); if (v) v.textContent = e.detail.value; }
      });
    });

    // Button events
    document.querySelectorAll('cigvis-button').forEach(b => {
      b.addEventListener('click', () => {
        const log = document.getElementById('btn-log');
        if (log) {
          const t = new Date().toLocaleTimeString('en-US',{hour12:false});
          log.innerHTML = `<span class="event-time">${t}</span><span class="event-type">click</span><span class="event-data">"${b.label}"</span>`;
        }
      });
    });

    // Dropdown events
    document.querySelectorAll('cigvis-dropdown-select').forEach(s => {
      s.addEventListener('change', e => {
        const row = s.closest('.form-row');
        if (row) { const v = row.querySelector('.form-value'); if (v) v.textContent = e.detail.value; }
      });
    });

    // Draw seismic trace on canvas
    const pc = document.getElementById('canvas');
    if (pc) {
      const draw = () => {
        const c = pc.canvas, x = pc.ctx;
        if (!c || !x) { requestAnimationFrame(draw); return; }
        requestAnimationFrame(() => {
          const w = c.width, h = c.height;
          if (!w || !h) return;

          x.fillStyle = '#ffffff';
          x.fillRect(0, 0, w, h);

          // Grid
          x.strokeStyle = 'rgba(0,0,0,0.06)';
          x.lineWidth = 1;
          for (let i = 0; i < w; i += 40) { x.beginPath(); x.moveTo(i,0); x.lineTo(i,h); x.stroke(); }
          for (let i = 0; i < h; i += 40) { x.beginPath(); x.moveTo(0,i); x.lineTo(w,i); x.stroke(); }

          // Axes
          x.strokeStyle = '#000000';
          x.lineWidth = 0.5;
          x.beginPath(); x.moveTo(40,15); x.lineTo(40,h-20); x.lineTo(w-15,h-20); x.stroke();

          // Y ticks
          x.fillStyle = '#444444';
          x.font = '10px Courier New';
          x.textAlign = 'right';
          for (let i=0;i<=4;i++) {
            const y = 15+(h-35)*(1-i/4);
            const v = (i*0.5-1).toFixed(1);
            x.fillText(v,36,y+3);
            x.beginPath(); x.moveTo(38,y); x.lineTo(42,y); x.stroke();
          }

          // X ticks
          x.textAlign = 'center';
          for (let i=0;i<=6;i++) {
            const px = 40+(w-55)*i/6;
            x.fillText((i*40).toString(),px,h-6);
          }

          // Waveform
          x.strokeStyle = '#000000';
          x.lineWidth = 1;
          x.beginPath();
          const mid = h/2;
          for (let i=40;i<w-15;i++) {
            const t = (i-40)/(w-55);
            const env = Math.exp(-t*3)*Math.sin(t*Math.PI);
            const noise = (Math.random()-0.5)*0.12;
            const py = mid-(env+noise)*(h*0.35);
            if (i===40) x.moveTo(i,py); else x.lineTo(i,py);
          }
          x.stroke();

          // Fill
          x.lineTo(w-15,mid); x.lineTo(40,mid); x.closePath();
          x.fillStyle = 'rgba(0,0,0,0.06)';
          x.fill();

          // Labels
          x.fillStyle = '#444444';
          x.font = '11px Times New Roman';
          x.textAlign = 'center';
          x.fillText('Time (ms)',w/2,h-0);
          x.save(); x.translate(10,h/2); x.rotate(-Math.PI/2);
          x.fillText('Amplitude',0,0); x.restore();
        });
      };
      draw();
    }

    // Console error counter
    let errs=0;
    const oe=console.error;
    console.error=(...a)=>{errs++;document.getElementById('err-count').textContent=errs;
    document.getElementById('err-count').className='status-err';oe.apply(console,a);};
  </script>
</body>
</html>
