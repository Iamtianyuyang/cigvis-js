<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIGVis - 2D Plot Examples</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
    }
    .header {
      background: #161922;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .back { color: #00d4aa; text-decoration: none; font-size: 13px; }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }
    .card {
      background: #161922;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
    }
    .card-body {
      padding: 16px;
    }
    canvas {
      width: 100%;
      background: #0f1117;
      border-radius: 8px;
    }
    .colorbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .colorbar-label {
      font-size: 10px;
      color: #5c6078;
    }
    .colorbar-bar {
      flex: 1;
      height: 8px;
      border-radius: 4px;
    }
    .info {
      margin-top: 12px;
      font-size: 12px;
      color: #5c6078;
    }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href="../index.html">← Back</a>
    <h1>2D Plot Examples</h1>
  </div>

  <div class="container">
    <div class="grid">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Gray Colormap</div>
        </div>
        <div class="card-body">
          <canvas id="img-gray" width="512" height="384"></canvas>
          <div class="colorbar">
            <span class="colorbar-label">-1.0</span>
            <div class="colorbar-bar" style="background: linear-gradient(to right, #000000, #ffffff);"></div>
            <span class="colorbar-label">1.0</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Petrel Colormap</div>
        </div>
        <div class="card-body">
          <canvas id="img-petrel" width="512" height="384"></canvas>
          <div class="colorbar">
            <span class="colorbar-label">-1.0</span>
            <div class="colorbar-bar" style="background: linear-gradient(to right, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000);"></div>
            <span class="colorbar-label">1.0</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">With Fault Overlay</div>
        </div>
        <div class="card-body">
          <canvas id="img-overlay" width="512" height="384"></canvas>
          <div class="info">Base: gray, Overlay: red fault line</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">With Well Markers</div>
        </div>
        <div class="card-body">
          <canvas id="img-markers" width="512" height="384"></canvas>
          <div class="info">5 well locations marked</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Colormaps
    const colormaps = {
      gray: t => [t, t, t],
      petrel: t => {
        const r = Math.min(1, Math.max(0, t * 2 - 0.5));
        const g = Math.min(1, Math.max(0, 1 - Math.abs(t - 0.5) * 2));
        const b = Math.min(1, Math.max(0, 0.5 - t * 2 + 1));
        return [r, g, b];
      },
    };

    // Generate seismic-like data
    function generateSeismic(width, height, phase = 0) {
      const data = new Float32Array(width * height);
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const t = x / width;
          const layer1 = Math.sin(t * Math.PI * 6 + phase) * 0.5;
          const layer2 = Math.cos(t * Math.PI * 3 - y * 0.02 + phase) * 0.3;
          const noise = (Math.random() - 0.5) * 0.1;
          data[y * width + x] = layer1 + layer2 + noise;
        }
      }
      return data;
    }

    // Plot 2D image
    function plot2D(canvasId, data, width, height, cmap = 'gray') {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const cmapFn = colormaps[cmap] || colormaps.gray;

      const imageData = ctx.createImageData(width, height);
      const [vmin, vmax] = [-1, 1];
      const range = vmax - vmin;

      for (let i = 0; i < width * height; i++) {
        let t = (data[i] - vmin) / range;
        t = Math.max(0, Math.min(1, t));
        const [r, g, b] = cmapFn(t);
        imageData.data[i * 4] = Math.round(r * 255);
        imageData.data[i * 4 + 1] = Math.round(g * 255);
        imageData.data[i * 4 + 2] = Math.round(b * 255);
        imageData.data[i * 4 + 3] = 255;
      }

      // Scale to canvas
      const temp = document.createElement('canvas');
      temp.width = width;
      temp.height = height;
      temp.getContext('2d').putImageData(imageData, 0, 0);
      ctx.drawImage(temp, 0, 0, canvas.width, canvas.height);
    }

    // Plot with fault overlay
    function plotWithOverlay(canvasId, data, width, height) {
      plot2D(canvasId, data, width, height, 'gray');

      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const scaleX = canvas.width / width;
      const scaleY = canvas.height / height;

      // Draw fault line
      ctx.strokeStyle = '#ff0000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let y = 0; y < height; y++) {
        const x = Math.round(width * 0.4 + y * 0.2);
        const px = x * scaleX;
        const py = y * scaleY;
        if (y === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }

    // Plot with well markers
    function plotWithMarkers(canvasId, data, width, height, wells) {
      plot2D(canvasId, data, width, height, 'petrel');

      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const scaleX = canvas.width / width;
      const scaleY = canvas.height / height;

      for (const well of wells) {
        const x = well.x * scaleX;
        const y = well.y * scaleY;

        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#00d4aa';
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(well.name, x + 10, y + 4);
      }
    }

    // Generate data
    const W = 256, H = 192;
    const imgData = generateSeismic(W, H);

    // Wells
    const wells = [
      { x: 64, y: 48, name: 'A-1' },
      { x: 128, y: 96, name: 'B-2' },
      { x: 192, y: 64, name: 'C-3' },
      { x: 96, y: 144, name: 'D-4' },
      { x: 160, y: 160, name: 'E-5' },
    ];

    // Plot
    plot2D('img-gray', imgData, W, H, 'gray');
    plot2D('img-petrel', imgData, W, H, 'petrel');
    plotWithOverlay('img-overlay', imgData, W, H);
    plotWithMarkers('img-markers', imgData, W, H, wells);
  </script>
</body>
</html>
