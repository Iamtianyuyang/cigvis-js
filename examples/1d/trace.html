<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIGVis — 1D Trace</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Times New Roman', Georgia, serif;
      background: #ffffff;
      color: #000000;
    }
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid #000;
      display: flex; align-items: center; gap: 16px;
    }
    .header h1 { font-size: 18px; font-weight: bold; }
    .back { color: #000; text-decoration: none; font-size: 13px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .figure { margin-bottom: 36px; }
    .figure-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
    .figure-caption { font-size: 12px; color: #333; margin-top: 8px; font-style: italic; }
    .plot-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .plot-item { flex: 1; min-width: 200px; }
    canvas { display: block; border: 0.5pt solid #000; }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href="../index.html">← Examples</a>
    <h1>1D Trace Examples</h1>
  </div>

  <div class="container">
    <div class="figure">
      <div class="figure-title">Single Trace</div>
      <canvas id="single" width="800" height="400"></canvas>
      <div class="figure-caption">500 samples · 4 ms dt · 30 Hz Ricker wavelet</div>
    </div>

    <div class="figure">
      <div class="figure-title">Multi-Trace Section</div>
      <canvas id="multi" width="800" height="400"></canvas>
      <div class="figure-caption">30 traces · variable area fill</div>
    </div>

    <div class="figure">
      <div class="figure-title">Fill Modes</div>
      <div class="plot-row">
        <div class="plot-item">
          <canvas id="fill-pos" width="300" height="400"></canvas>
          <div class="figure-caption">Positive fill</div>
        </div>
        <div class="plot-item">
          <canvas id="fill-neg" width="300" height="400"></canvas>
          <div class="figure-caption">Negative fill</div>
        </div>
        <div class="plot-item">
          <canvas id="fill-both" width="300" height="400"></canvas>
          <div class="figure-caption">Both</div>
        </div>
      </div>
    </div>

    <div class="figure">
      <div class="figure-title">Ricker Wavelets</div>
      <div class="plot-row">
        <div class="plot-item"><canvas id="w20" width="300" height="180"></canvas><div class="figure-caption">20 Hz</div></div>
        <div class="plot-item"><canvas id="w30" width="300" height="180"></canvas><div class="figure-caption">30 Hz</div></div>
        <div class="plot-item"><canvas id="w40" width="300" height="180"></canvas><div class="figure-caption">40 Hz</div></div>
      </div>
    </div>
  </div>

  <script>
    const DPR = window.devicePixelRatio || 1;

    function setupCanvas(id, logicalW, logicalH) {
      const canvas = document.getElementById(id);
      canvas.width = logicalW * DPR;
      canvas.height = logicalH * DPR;
      canvas.style.width = logicalW + 'px';
      canvas.style.height = logicalH + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(DPR, DPR);
      return ctx;
    }

    function ricker(n, dt, f) {
      const d = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        const t = (i - n/2) * dt / 1000;
        const p = (Math.PI*f)**2;
        d[i] = (1 - 2*p*t*t) * Math.exp(-p*t*t);
      }
      return d;
    }

    function genTrace(n, dt, f) {
      const w = ricker(64, dt, f);
      const d = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        let v = 0;
        for (let j = 0; j < w.length; j++) {
          const k = i - 32 + j;
          if (k >= 0 && k < n) {
            const r = Math.random() > 0.95 ? (Math.random()-0.5)*2 : 0;
            v += w[j] * r;
          }
        }
        d[i] = v;
      }
      return d;
    }

    function drawAxes(ctx, m, pw, ph) {
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(m.l, m.t); ctx.lineTo(m.l, m.t+ph); ctx.lineTo(m.l+pw, m.t+ph);
      ctx.stroke();
    }

    // xRange/yRange are [min, max] for the horizontal/vertical axis respectively —
    // each tick is positioned by fraction of pw/ph and labeled by the matching
    // fraction of the data range, so axes with a non-zero minimum (e.g. amplitude) label correctly.
    function drawTicks(ctx, m, pw, ph, nx, ny, xRange, yRange, xFmt = v => Math.round(v).toString(), yFmt = v => Math.round(v).toString()) {
      const [xmin, xmax] = xRange, [ymin, ymax] = yRange;
      ctx.fillStyle = '#000000';
      ctx.font = '10px Times New Roman';

      ctx.textAlign = 'center';
      for (let i = 0; i <= nx; i++) {
        const x = m.l + (i/nx)*pw;
        ctx.fillText(xFmt(xmin + (i/nx)*(xmax-xmin)), x, m.t+ph+14);
        ctx.beginPath(); ctx.moveTo(x, m.t+ph); ctx.lineTo(x, m.t+ph+3); ctx.stroke();
      }

      ctx.textAlign = 'right';
      for (let i = 0; i <= ny; i++) {
        const y = m.t + (i/ny)*ph;
        ctx.fillText(yFmt(ymin + (i/ny)*(ymax-ymin)), m.l-6, y+3);
        ctx.beginPath(); ctx.moveTo(m.l-3, y); ctx.lineTo(m.l, y); ctx.stroke();
      }
    }

    function drawLabels(ctx, m, pw, ph, xLabel, yLabel) {
      ctx.fillStyle = '#000000';
      ctx.font = '12px Times New Roman';
      ctx.textAlign = 'center';
      ctx.fillText(xLabel, m.l+pw/2, m.t+ph+30);
      ctx.save();
      ctx.translate(12, m.t+ph/2);
      ctx.rotate(-Math.PI/2);
      ctx.fillText(yLabel, 0, 0);
      ctx.restore();
    }

    function plotTrace(id, data, opts={}) {
      const lw = 800, lh = 400;
      const ctx = setupCanvas(id, lw, lh);
      const w = lw, h = lh;
      const m = {l:45, r:15, t:15, b:35};
      const pw = w-m.l-m.r, ph = h-m.t-m.b;

      ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,w,h);
      drawAxes(ctx, m, pw, ph);

      let mn=Infinity, mx=-Infinity;
      for (let i=0;i<data.length;i++) { if(data[i]<mn)mn=data[i]; if(data[i]>mx)mx=data[i]; }

      // The trace is plotted with amplitude along x (horizontal) and time along y
      // (vertical, increasing downward) — the standard convention for a single
      // wiggle trace — so the axes must be labeled to match.
      drawTicks(ctx, m, pw, ph, 5, 5, [mn, mx], [0, data.length*4/1000], v => v.toFixed(2), v => v.toFixed(2));
      drawLabels(ctx, m, pw, ph, 'Amplitude', 'Time (s)');

      // Zero line
      const midX = m.l + ((0-mn)/(mx-mn))*pw;
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 0.5;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(midX, m.t); ctx.lineTo(midX, m.t+ph); ctx.stroke();
      ctx.setLineDash([]);

      // Trace
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i=0;i<data.length;i++) {
        const x = m.l+((data[i]-mn)/(mx-mn))*pw;
        const y = m.t+(i/data.length)*ph;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }

    function plotMulti(id, n, ns) {
      const lw = 800, lh = 400;
      const ctx = setupCanvas(id, lw, lh);
      const w = lw, h = lh;
      const m = {l:45, r:15, t:15, b:35};
      const pw = w-m.l-m.r, ph = h-m.t-m.b;

      ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,w,h);
      drawAxes(ctx, m, pw, ph);
      drawLabels(ctx, m, pw, ph, 'Trace', 'Time (s)');

      const tw = pw/n;
      const amp = tw*0.8;

      for (let t=0;t<n;t++) {
        const cx = m.l + t*tw + tw/2;
        const d = genTrace(ns, 4, 30);
        let mn=Infinity, mx=-Infinity;
        for (let i=0;i<d.length;i++) { if(d[i]<mn)mn=d[i]; if(d[i]>mx)mx=d[i]; }
        const r = mx-mn||1;

        // Fill
        ctx.beginPath(); ctx.moveTo(cx, m.t);
        for (let i=0;i<ns;i++) {
          const y=m.t+(i/ns)*ph; const v=(d[i]-mn)/r-0.5;
          ctx.lineTo(cx+v*amp, y);
        }
        ctx.lineTo(cx, m.t+ph); ctx.closePath();
        ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fill();

        // Line
        ctx.beginPath();
        for (let i=0;i<ns;i++) {
          const y=m.t+(i/ns)*ph; const v=(d[i]-mn)/r-0.5;
          if(i===0)ctx.moveTo(cx+v*amp,y); else ctx.lineTo(cx+v*amp,y);
        }
        ctx.strokeStyle='#000000'; ctx.lineWidth=0.5; ctx.stroke();
      }

      // X ticks (trace index)
      ctx.fillStyle='#000000'; ctx.font='10px Times New Roman'; ctx.textAlign='center';
      for(let t=0;t<n;t+=5) ctx.fillText(t.toString(), m.l+t*tw+tw/2, m.t+ph+14);

      // Y ticks (time, increasing downward)
      ctx.strokeStyle='#000000'; ctx.lineWidth=0.5; ctx.textAlign='right';
      for (let i = 0; i <= 4; i++) {
        const y = m.t + (i/4)*ph;
        const time = ((i/4) * ns * 4 / 1000).toFixed(2);
        ctx.fillText(time, m.l-6, y+3);
        ctx.beginPath(); ctx.moveTo(m.l-3, y); ctx.lineTo(m.l, y); ctx.stroke();
      }
    }

    function plotFill(id, data, type, dt=4) {
      const lw = 300, lh = 400;
      const ctx = setupCanvas(id, lw, lh);
      const w = lw, h = lh;
      const m = {l:38, r:10, t:15, b:30};
      const pw = w-m.l-m.r, ph = h-m.t-m.b;
      const mid = m.l+pw/2;

      ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,w,h);

      let mn=Infinity, mx=-Infinity;
      for(let i=0;i<data.length;i++){if(data[i]<mn)mn=data[i];if(data[i]>mx)mx=data[i];}

      // Axis (time on Y, no X scale — amplitude is folded around center)
      drawAxes(ctx, m, pw, ph);
      ctx.fillStyle = '#000000';
      ctx.font = '10px Times New Roman';
      ctx.textAlign = 'right';
      for (let i = 0; i <= 4; i++) {
        const y = m.t + (i/4)*ph;
        const t = ((i/4) * data.length * dt / 1000).toFixed(2);
        ctx.fillText(t, m.l-6, y+3);
        ctx.beginPath(); ctx.moveTo(m.l-3, y); ctx.lineTo(m.l, y); ctx.stroke();
      }
      ctx.save();
      ctx.translate(11, m.t+ph/2);
      ctx.rotate(-Math.PI/2);
      ctx.font = '11px Times New Roman';
      ctx.textAlign = 'center';
      ctx.fillText('Time (s)', 0, 0);
      ctx.restore();

      // Zero line
      ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=0.5;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(mid,m.t); ctx.lineTo(mid,m.t+ph); ctx.stroke();
      ctx.setLineDash([]);

      // Fill
      if(type==='pos'||type==='both'){
        ctx.beginPath(); ctx.moveTo(mid,m.t);
        for(let i=0;i<data.length;i++){
          const y=m.t+(i/data.length)*ph;
          const v=(data[i]-mn)/(mx-mn)-0.5;
          if(v>0)ctx.lineTo(mid+v*pw,y); else ctx.lineTo(mid,y);
        }
        ctx.lineTo(mid,m.t+ph); ctx.closePath();
        ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fill();
      }
      if(type==='neg'||type==='both'){
        ctx.beginPath(); ctx.moveTo(mid,m.t);
        for(let i=0;i<data.length;i++){
          const y=m.t+(i/data.length)*ph;
          const v=(data[i]-mn)/(mx-mn)-0.5;
          if(v<0)ctx.lineTo(mid+v*pw,y); else ctx.lineTo(mid,y);
        }
        ctx.lineTo(mid,m.t+ph); ctx.closePath();
        ctx.fillStyle='rgba(128,128,128,0.2)'; ctx.fill();
      }

      // Line
      ctx.beginPath();
      for(let i=0;i<data.length;i++){
        const x=m.l+((data[i]-mn)/(mx-mn))*pw;
        const y=m.t+(i/data.length)*ph;
        if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.strokeStyle='#000000'; ctx.lineWidth=1; ctx.stroke();
    }

    function plotWavelet(id, freq, dt=4) {
      const n = 100;
      const d = ricker(n, dt, freq);
      const lw = 300, lh = 180;
      const ctx = setupCanvas(id, lw, lh);
      const w = lw, h = lh;
      const m = {l:34, r:10, t:15, b:30};
      const pw = w-m.l-m.r, ph = h-m.t-m.b;
      const mid = m.t+ph/2;

      ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,w,h);

      // Axis
      drawAxes(ctx, m, pw, ph);
      ctx.fillStyle = '#000000';
      ctx.font = '10px Times New Roman';
      ctx.textAlign = 'center';
      for (let i = 0; i <= 4; i++) {
        const x = m.l + (i/4)*pw;
        const t = Math.round((i/4 - 0.5) * n * dt);
        ctx.fillText(t.toString(), x, m.t+ph+14);
        ctx.beginPath(); ctx.moveTo(x, m.t+ph); ctx.lineTo(x, m.t+ph+3); ctx.stroke();
      }
      ctx.font = '11px Times New Roman';
      ctx.fillText('Time (ms)', m.l+pw/2, m.t+ph+27);

      ctx.save();
      ctx.translate(11, m.t+ph/2);
      ctx.rotate(-Math.PI/2);
      ctx.font = '11px Times New Roman';
      ctx.textAlign = 'center';
      ctx.fillText('Amplitude', 0, 0);
      ctx.restore();

      // Zero line
      ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.5;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(m.l,mid); ctx.lineTo(m.l+pw,mid); ctx.stroke();
      ctx.setLineDash([]);

      // Wavelet
      ctx.strokeStyle='#000000'; ctx.lineWidth=1;
      ctx.beginPath();
      for(let i=0;i<d.length;i++){
        const x=m.l+(i/d.length)*pw;
        const y=mid-d[i]*ph*0.4;
        if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }

    // Render
    plotTrace('single', genTrace(500, 4, 30));
    plotMulti('multi', 30, 200);
    plotFill('fill-pos', genTrace(300, 4, 30), 'pos');
    plotFill('fill-neg', genTrace(300, 4, 30), 'neg');
    plotFill('fill-both', genTrace(300, 4, 30), 'both');
    plotWavelet('w20', 20);
    plotWavelet('w30', 30);
    plotWavelet('w40', 40);
  </script>
</body>
</html>
