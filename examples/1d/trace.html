<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIGVis — 1D Trace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c14;
      --bg-card: #12121c;
      --border: rgba(255,255,255,0.06);
      --text: #e8eaed;
      --text-2: #8b8fa3;
      --text-3: #5c6078;
      --accent: #00d4aa;
      --sans: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); }

    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 0 24px; height: 48px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }
    .back { color: var(--accent); text-decoration: none; font-size: 12px; font-family: var(--mono); }
    .topbar-title { font-size: 14px; font-weight: 600; }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    .figure { margin-bottom: 32px; }
    .figure-title {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-2); margin-bottom: 12px;
    }
    .figure-caption {
      font-size: 12px; color: var(--text-3); margin-top: 8px;
    }

    .plot-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .plot-item { flex: 1; min-width: 200px; }

    canvas {
      display: block; width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">← back</a>
    <span class="topbar-title">1D Trace</span>
  </div>

  <div class="container">
    <div class="figure">
      <div class="figure-title">Single Trace</div>
      <canvas id="single" width="800" height="400"></canvas>
      <div class="figure-caption">500 samples · 4 ms dt · 30 Hz Ricker wavelet</div>
    </div>

    <div class="figure">
      <div class="figure-title">Multi-Trace Section</div>
      <canvas id="multi" width="800" height="400"></canvas>
      <div class="figure-caption">30 traces · variable area fill</div>
    </div>

    <div class="figure">
      <div class="figure-title">Fill Modes</div>
      <div class="plot-row">
        <div class="plot-item">
          <canvas id="fill-pos" width="300" height="400"></canvas>
          <div class="figure-caption">Positive fill</div>
        </div>
        <div class="plot-item">
          <canvas id="fill-neg" width="300" height="400"></canvas>
          <div class="figure-caption">Negative fill</div>
        </div>
        <div class="plot-item">
          <canvas id="fill-both" width="300" height="400"></canvas>
          <div class="figure-caption">Both</div>
        </div>
      </div>
    </div>

    <div class="figure">
      <div class="figure-title">Ricker Wavelets</div>
      <div class="plot-row">
        <div class="plot-item"><canvas id="w20" width="300" height="180"></canvas><div class="figure-caption">20 Hz</div></div>
        <div class="plot-item"><canvas id="w30" width="300" height="180"></canvas><div class="figure-caption">30 Hz</div></div>
        <div class="plot-item"><canvas id="w40" width="300" height="180"></canvas><div class="figure-caption">40 Hz</div></div>
      </div>
    </div>
  </div>

  <script>
    function ricker(n, dt, f) {
      const d = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        const t = (i - n/2) * dt / 1000;
        const p = (Math.PI*f)**2;
        d[i] = (1 - 2*p*t*t) * Math.exp(-p*t*t);
      }
      return d;
    }

    function genTrace(n, dt, f) {
      const w = ricker(64, dt, f);
      const d = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        let v = 0;
        for (let j = 0; j < w.length; j++) {
          const k = i - 32 + j;
          if (k >= 0 && k < n) {
            const r = Math.random() > 0.95 ? (Math.random()-0.5)*2 : 0;
            v += w[j] * r;
          }
        }
        d[i] = v;
      }
      return d;
    }

    function drawAxes(ctx, m, pw, ph) {
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(m.l, m.t); ctx.lineTo(m.l, m.t+ph); ctx.lineTo(m.l+pw, m.t+ph);
      ctx.stroke();
    }

    function drawTicks(ctx, m, pw, ph, nx, ny, lx, ly) {
      ctx.fillStyle = '#5c6078';
      ctx.font = '10px JetBrains Mono';

      ctx.textAlign = 'center';
      for (let i = 0; i <= nx; i++) {
        const x = m.l + (i/nx)*pw;
        ctx.fillText(Math.round(i/nx*lx).toString(), x, m.t+ph+14);
        ctx.beginPath(); ctx.moveTo(x, m.t+ph); ctx.lineTo(x, m.t+ph+3); ctx.stroke();
      }

      ctx.textAlign = 'right';
      for (let i = 0; i <= ny; i++) {
        const y = m.t + (i/ny)*ph;
        ctx.fillText((i/ny*ly).toFixed(1), m.l-6, y+3);
        ctx.beginPath(); ctx.moveTo(m.l-3, y); ctx.lineTo(m.l, y); ctx.stroke();
      }
    }

    function drawLabels(ctx, m, pw, ph, xLabel, yLabel) {
      ctx.fillStyle = '#8b8fa3';
      ctx.font = '11px Inter';
      ctx.textAlign = 'center';
      ctx.fillText(xLabel, m.l+pw/2, m.t+ph+30);
      ctx.save();
      ctx.translate(12, m.t+ph/2);
      ctx.rotate(-Math.PI/2);
      ctx.fillText(yLabel, 0, 0);
      ctx.restore();
    }

    function plotTrace(id, data, opts={}) {
      const c = document.getElementById(id);
      const ctx = c.getContext('2d');
      const w = c.width, h = c.height;
      const m = {l:45, r:15, t:15, b:35};
      const pw = w-m.l-m.r, ph = h-m.t-m.b;

      ctx.fillStyle = '#0c0c14'; ctx.fillRect(0,0,w,h);
      drawAxes(ctx, m, pw, ph);

      let mn=Infinity, mx=-Infinity;
      for (let i=0;i<data.length;i++) { if(data[i]<mn)mn=data[i]; if(data[i]>mx)mx=data[i]; }

      drawTicks(ctx, m, pw, ph, 5, 5, data.length*4/1000, mx-mn);
      drawLabels(ctx, m, pw, ph, 'Time (s)', 'Amplitude');

      // Zero line
      const midX = m.l + ((0-mn)/(mx-mn))*pw;
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 0.5;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(midX, m.t); ctx.lineTo(midX, m.t+ph); ctx.stroke();
      ctx.setLineDash([]);

      // Trace
      ctx.strokeStyle = '#00d4aa';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let i=0;i<data.length;i++) {
        const x = m.l+((data[i]-mn)/(mx-mn))*pw;
        const y = m.t+(i/data.length)*ph;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }

    function plotMulti(id, n, ns) {
      const c = document.getElementById(id);
      const ctx = c.getContext('2d');
      const w = c.width, h = c.height;
      const m = {l:45, r:15, t:15, b:35};
      const pw = w-m.l-m.r, ph = h-m.t-m.b;

      ctx.fillStyle = '#0c0c14'; ctx.fillRect(0,0,w,h);
      drawAxes(ctx, m, pw, ph);
      drawLabels(ctx, m, pw, ph, 'Trace', 'Time (s)');

      const tw = pw/n;
      const amp = tw*0.8;

      for (let t=0;t<n;t++) {
        const cx = m.l + t*tw + tw/2;
        const d = genTrace(ns, 4, 30);
        let mn=Infinity, mx=-Infinity;
        for (let i=0;i<d.length;i++) { if(d[i]<mn)mn=d[i]; if(d[i]>mx)mx=d[i]; }
        const r = mx-mn||1;

        // Fill
        ctx.beginPath(); ctx.moveTo(cx, m.t);
        for (let i=0;i<ns;i++) {
          const y=m.t+(i/ns)*ph; const v=(d[i]-mn)/r-0.5;
          ctx.lineTo(cx+v*amp, y);
        }
        ctx.lineTo(cx, m.t+ph); ctx.closePath();
        ctx.fillStyle='rgba(0,212,170,0.15)'; ctx.fill();

        // Line
        ctx.beginPath();
        for (let i=0;i<ns;i++) {
          const y=m.t+(i/ns)*ph; const v=(d[i]-mn)/r-0.5;
          if(i===0)ctx.moveTo(cx+v*amp,y); else ctx.lineTo(cx+v*amp,y);
        }
        ctx.strokeStyle='#00d4aa'; ctx.lineWidth=0.5; ctx.stroke();
      }

      // X ticks
      ctx.fillStyle='#5c6078'; ctx.font='10px JetBrains Mono'; ctx.textAlign='center';
      for(let t=0;t<n;t+=5) ctx.fillText(t.toString(), m.l+t*tw+tw/2, m.t+ph+14);
    }

    function plotFill(id, data, type) {
      const c = document.getElementById(id);
      const ctx = c.getContext('2d');
      const w = c.width, h = c.height;
      const m = {l:35, r:10, t:15, b:30};
      const pw = w-m.l-m.r, ph = h-m.t-m.b;
      const mid = m.l+pw/2;

      ctx.fillStyle = '#0c0c14'; ctx.fillRect(0,0,w,h);

      let mn=Infinity, mx=-Infinity;
      for(let i=0;i<data.length;i++){if(data[i]<mn)mn=data[i];if(data[i]>mx)mx=data[i];}

      // Zero line
      ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=0.5;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(mid,m.t); ctx.lineTo(mid,m.t+ph); ctx.stroke();
      ctx.setLineDash([]);

      // Fill
      if(type==='pos'||type==='both'){
        ctx.beginPath(); ctx.moveTo(mid,m.t);
        for(let i=0;i<data.length;i++){
          const y=m.t+(i/data.length)*ph;
          const v=(data[i]-mn)/(mx-mn)-0.5;
          if(v>0)ctx.lineTo(mid+v*pw,y); else ctx.lineTo(mid,y);
        }
        ctx.lineTo(mid,m.t+ph); ctx.closePath();
        ctx.fillStyle='rgba(0,212,170,0.2)'; ctx.fill();
      }
      if(type==='neg'||type==='both'){
        ctx.beginPath(); ctx.moveTo(mid,m.t);
        for(let i=0;i<data.length;i++){
          const y=m.t+(i/data.length)*ph;
          const v=(data[i]-mn)/(mx-mn)-0.5;
          if(v<0)ctx.lineTo(mid+v*pw,y); else ctx.lineTo(mid,y);
        }
        ctx.lineTo(mid,m.t+ph); ctx.closePath();
        ctx.fillStyle='rgba(244,63,94,0.2)'; ctx.fill();
      }

      // Line
      ctx.beginPath();
      for(let i=0;i<data.length;i++){
        const x=m.l+((data[i]-mn)/(mx-mn))*pw;
        const y=m.t+(i/data.length)*ph;
        if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.strokeStyle='#00d4aa'; ctx.lineWidth=1; ctx.stroke();
    }

    function plotWavelet(id, freq) {
      const d = ricker(100, 4, freq);
      const c = document.getElementById(id);
      const ctx = c.getContext('2d');
      const w = c.width, h = c.height;
      const m = {l:30, r:10, t:15, b:25};
      const pw = w-m.l-m.r, ph = h-m.t-m.b;
      const mid = m.t+ph/2;

      ctx.fillStyle='#0c0c14'; ctx.fillRect(0,0,w,h);

      // Zero line
      ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=0.5;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(m.l,mid); ctx.lineTo(m.l+pw,mid); ctx.stroke();
      ctx.setLineDash([]);

      // Wavelet
      ctx.strokeStyle='#00d4aa'; ctx.lineWidth=1.5;
      ctx.beginPath();
      for(let i=0;i<d.length;i++){
        const x=m.l+(i/d.length)*pw;
        const y=mid-d[i]*ph*0.4;
        if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();

      ctx.fillStyle='#5c6078'; ctx.font='10px JetBrains Mono'; ctx.textAlign='center';
      ctx.fillText(`${freq} Hz`, w/2, h-5);
    }

    // Render
    plotTrace('single', genTrace(500, 4, 30));
    plotMulti('multi', 30, 200);
    plotFill('fill-pos', genTrace(300, 4, 30), 'pos');
    plotFill('fill-neg', genTrace(300, 4, 30), 'neg');
    plotFill('fill-both', genTrace(300, 4, 30), 'both');
    plotWavelet('w20', 20);
    plotWavelet('w30', 30);
    plotWavelet('w40', 40);
  </script>
</body>
</html>
