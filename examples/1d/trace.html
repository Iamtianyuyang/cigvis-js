<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIGVis - 1D Trace Examples</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
    }
    .header {
      background: #161922;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .back { color: #00d4aa; text-decoration: none; font-size: 13px; }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }
    .card {
      background: #161922;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
    }
    .card-body {
      padding: 16px;
    }
    canvas {
      width: 100%;
      background: #0f1117;
      border-radius: 8px;
    }
    .info {
      margin-top: 12px;
      font-size: 12px;
      color: #5c6078;
      display: flex;
      gap: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href="../index.html">← Back</a>
    <h1>1D Trace Examples</h1>
  </div>

  <div class="container">
    <div class="grid">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Single Trace</div>
        </div>
        <div class="card-body">
          <canvas id="single-trace" width="600" height="400"></canvas>
          <div class="info">
            <span>500 samples</span>
            <span>4ms dt</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Multi Traces</div>
        </div>
        <div class="card-body">
          <canvas id="multi-traces" width="600" height="400"></canvas>
          <div class="info">
            <span>30 traces</span>
            <span>200 samples</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Filled Area</div>
        </div>
        <div class="card-body">
          <canvas id="filled-trace" width="600" height="400"></canvas>
          <div class="info">
            <span>Variable area</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Wavelet Comparison</div>
        </div>
        <div class="card-body">
          <canvas id="wavelets" width="600" height="300"></canvas>
          <div class="info">
            <span>20Hz, 30Hz, 40Hz</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Generate Ricker wavelet
    function rickerWavelet(nSamples, dt, freq) {
      const data = new Float32Array(nSamples);
      for (let i = 0; i < nSamples; i++) {
        const t = (i - nSamples / 2) * dt / 1000;
        const pi2f2 = (Math.PI * freq) ** 2;
        data[i] = (1 - 2 * pi2f2 * t * t) * Math.exp(-pi2f2 * t * t);
      }
      return data;
    }

    // Generate seismic trace
    function generateTrace(nSamples, dt, freq) {
      const wavelet = rickerWavelet(64, dt, freq);
      const data = new Float32Array(nSamples);
      for (let i = 0; i < nSamples; i++) {
        let val = 0;
        for (let j = 0; j < wavelet.length; j++) {
          const idx = i - Math.floor(wavelet.length / 2) + j;
          if (idx >= 0 && idx < nSamples) {
            const reflectivity = Math.random() > 0.95 ? (Math.random() - 0.5) * 2 : 0;
            val += wavelet[j] * reflectivity;
          }
        }
        data[i] = val;
      }
      return data;
    }

    // Plot single trace
    function plotSingleTrace(canvasId, data, color = '#00d4aa') {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;

      ctx.fillStyle = '#0f1117';
      ctx.fillRect(0, 0, w, h);

      const margin = { left: 30, right: 10, top: 10, bottom: 20 };
      const plotW = w - margin.left - margin.right;
      const plotH = h - margin.top - margin.bottom;
      const midX = margin.left + plotW / 2;

      let min = Infinity, max = -Infinity;
      for (let i = 0; i < data.length; i++) {
        if (data[i] < min) min = data[i];
        if (data[i] > max) max = data[i];
      }

      // Zero line
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(midX, margin.top);
      ctx.lineTo(midX, h - margin.bottom);
      ctx.stroke();

      // Trace
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const y = margin.top + (i / data.length) * plotH;
        const x = midX + ((data[i] - min) / (max - min) - 0.5) * plotW;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // Plot multi traces
    function plotMultiTraces(canvasId, nTraces, nSamples) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;

      ctx.fillStyle = '#0f1117';
      ctx.fillRect(0, 0, w, h);

      const margin = { left: 40, right: 20, top: 10, bottom: 20 };
      const plotW = w - margin.left - margin.right;
      const plotH = h - margin.top - margin.bottom;

      const traceW = plotW / nTraces;
      const ampScale = traceW * 0.8;

      for (let t = 0; t < nTraces; t++) {
        const cx = margin.left + t * traceW + traceW / 2;
        const data = generateTrace(nSamples, 4, 30);

        let min = Infinity, max = -Infinity;
        for (let i = 0; i < data.length; i++) {
          if (data[i] < min) min = data[i];
          if (data[i] > max) max = data[i];
        }
        const range = max - min || 1;

        // Fill
        ctx.beginPath();
        ctx.moveTo(cx, margin.top);
        for (let i = 0; i < nSamples; i++) {
          const y = margin.top + (i / nSamples) * plotH;
          const val = (data[i] - min) / range - 0.5;
          ctx.lineTo(cx + val * ampScale, y);
        }
        ctx.lineTo(cx, h - margin.bottom);
        ctx.closePath();
        ctx.fillStyle = 'rgba(0, 212, 170, 0.2)';
        ctx.fill();

        // Line
        ctx.beginPath();
        for (let i = 0; i < nSamples; i++) {
          const y = margin.top + (i / nSamples) * plotH;
          const val = (data[i] - min) / range - 0.5;
          if (i === 0) ctx.moveTo(cx + val * ampScale, y);
          else ctx.lineTo(cx + val * ampScale, y);
        }
        ctx.strokeStyle = '#00d4aa';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }

    // Plot filled trace
    function plotFilledTrace(canvasId, data) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;

      ctx.fillStyle = '#0f1117';
      ctx.fillRect(0, 0, w, h);

      const margin = { left: 30, right: 10, top: 10, bottom: 20 };
      const plotW = w - margin.left - margin.right;
      const plotH = h - margin.top - margin.bottom;
      const midX = margin.left + plotW / 2;

      let min = Infinity, max = -Infinity;
      for (let i = 0; i < data.length; i++) {
        if (data[i] < min) min = data[i];
        if (data[i] > max) max = data[i];
      }

      // Fill positive
      ctx.beginPath();
      ctx.moveTo(midX, margin.top);
      for (let i = 0; i < data.length; i++) {
        const y = margin.top + (i / data.length) * plotH;
        const val = (data[i] - min) / (max - min) - 0.5;
        if (val > 0) ctx.lineTo(midX + val * plotW, y);
        else ctx.lineTo(midX, y);
      }
      ctx.lineTo(midX, h - margin.bottom);
      ctx.closePath();
      ctx.fillStyle = 'rgba(0, 212, 170, 0.3)';
      ctx.fill();

      // Fill negative
      ctx.beginPath();
      ctx.moveTo(midX, margin.top);
      for (let i = 0; i < data.length; i++) {
        const y = margin.top + (i / data.length) * plotH;
        const val = (data[i] - min) / (max - min) - 0.5;
        if (val < 0) ctx.lineTo(midX + val * plotW, y);
        else ctx.lineTo(midX, y);
      }
      ctx.lineTo(midX, h - margin.bottom);
      ctx.closePath();
      ctx.fillStyle = 'rgba(244, 63, 94, 0.3)';
      ctx.fill();

      // Line
      ctx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const y = margin.top + (i / data.length) * plotH;
        const x = midX + ((data[i] - min) / (max - min) - 0.5) * plotW;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = '#00d4aa';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Plot wavelets
    function plotWavelets(canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;

      ctx.fillStyle = '#0f1117';
      ctx.fillRect(0, 0, w, h);

      const freqs = [20, 30, 40];
      const colors = ['#00d4aa', '#0078d4', '#f43f5e'];

      for (let f = 0; f < freqs.length; f++) {
        const data = rickerWavelet(100, 4, freqs[f]);
        const margin = { left: 40, right: 20, top: 20 + f * 80, bottom: 10 };
        const plotW = w - margin.left - margin.right;
        const plotH = 60;

        // Label
        ctx.fillStyle = colors[f];
        ctx.font = '12px sans-serif';
        ctx.fillText(`${freqs[f]} Hz`, margin.left, margin.top - 5);

        // Zero line
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(margin.left, margin.top + plotH / 2);
        ctx.lineTo(margin.left + plotW, margin.top + plotH / 2);
        ctx.stroke();

        // Wavelet
        ctx.strokeStyle = colors[f];
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < data.length; i++) {
          const x = margin.left + (i / data.length) * plotW;
          const y = margin.top + plotH / 2 - data[i] * plotH * 0.8;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    // Generate and plot
    const trace1 = generateTrace(500, 4, 30);
    plotSingleTrace('single-trace', trace1);
    plotMultiTraces('multi-traces', 30, 200);
    plotFilledTrace('filled-trace', generateTrace(300, 4, 30));
    plotWavelets('wavelets');
  </script>
</body>
</html>
