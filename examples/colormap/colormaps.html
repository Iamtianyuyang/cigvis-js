<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIGVis - Colormaps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
    }
    .header {
      background: #161922;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .back { color: #00d4aa; text-decoration: none; font-size: 13px; }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .cmap-card {
      background: #161922;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .cmap-card:hover {
      border-color: rgba(0, 212, 170, 0.3);
    }
    .cmap-card.selected {
      border-color: #00d4aa;
      background: rgba(0, 212, 170, 0.05);
    }
    .cmap-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .cmap-desc {
      font-size: 11px;
      color: #5c6078;
      margin-bottom: 8px;
    }
    .cmap-bar {
      height: 16px;
      border-radius: 4px;
    }
    .preview {
      margin-top: 32px;
      background: #161922;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 24px;
    }
    .preview-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .preview-canvas {
      width: 100%;
      background: #0f1117;
      border-radius: 8px;
    }
    .preview-label {
      font-size: 12px;
      color: #5c6078;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href="../index.html">← Back</a>
    <h1>Colormaps</h1>
  </div>

  <div class="container">
    <div class="grid" id="cmap-grid"></div>

    <div class="preview">
      <div class="preview-title">Preview: <span id="selected-name">petrel</span></div>
      <div class="preview-grid">
        <div>
          <canvas class="preview-canvas" id="preview-seismic" width="400" height="200"></canvas>
          <div class="preview-label">Seismic Data</div>
        </div>
        <div>
          <canvas class="preview-canvas" id="preview-gradient" width="400" height="40"></canvas>
          <div class="preview-label">Gradient</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const colormaps = {
      gray: { colors: [[0,0,0],[255,255,255]], desc: 'Standard grayscale' },
      gray_r: { colors: [[255,255,255],[0,0,0]], desc: 'Reversed grayscale' },
      petrel: { colors: [[0,0,255],[0,255,255],[0,255,0],[255,255,0],[255,0,0]], desc: 'Geophysical standard' },
      seismic: { colors: [[0,0,178],[128,255,255],[255,255,255],[255,255,128],[178,0,0]], desc: 'Blue-white-red' },
      jet: { colors: [[0,0,128],[0,0,255],[0,255,255],[0,255,0],[255,255,0],[255,0,0],[128,0,0]], desc: 'Rainbow (jet)' },
      hot: { colors: [[0,0,0],[255,0,0],[255,255,0],[255,255,255]], desc: 'Black to white' },
      cool: { colors: [[0,255,255],[255,0,255]], desc: 'Cyan to magenta' },
      viridis: { colors: [[68,1,84],[59,82,139],[33,145,140],[94,201,98],[253,231,37]], desc: 'Perceptually uniform' },
      spring: { colors: [[255,0,255],[255,255,0]], desc: 'Magenta to yellow' },
      summer: { colors: [[0,128,102],[255,255,102]], desc: 'Green to yellow' },
      autumn: { colors: [[255,0,0],[255,255,0]], desc: 'Red to yellow' },
      winter: { colors: [[0,0,255],[0,255,128]], desc: 'Blue to green' },
      bone: { colors: [[0,0,0],[128,128,192],[255,255,255]], desc: 'Bone-like' },
      copper: { colors: [[0,0,0],[255,199,127]], desc: 'Copper tones' },
      rainbow: { colors: [[255,0,0],[255,255,0],[0,255,0],[0,255,255],[0,0,255],[255,0,255]], desc: 'Full rainbow' },
      terrain: { colors: [[0,0,128],[0,128,0],[255,255,0],[128,0,0],[255,255,255]], desc: 'Terrain colors' },
    };

    let selectedCmap = 'petrel';

    function gradientCSS(colors) {
      const stops = colors.map((c, i) => `rgb(${c.join(',')}) ${(i / (colors.length - 1) * 100).toFixed(1)}%`);
      return `linear-gradient(to right, ${stops.join(', ')})`;
    }

    function interpolateCmap(colors, t) {
      t = Math.max(0, Math.min(1, t));
      const idx = t * (colors.length - 1);
      const i = Math.floor(idx);
      const f = idx - i;
      if (i >= colors.length - 1) return colors[colors.length - 1];
      return [
        Math.round(colors[i][0] + (colors[i+1][0] - colors[i][0]) * f),
        Math.round(colors[i][1] + (colors[i+1][1] - colors[i][1]) * f),
        Math.round(colors[i][2] + (colors[i+1][2] - colors[i][2]) * f),
      ];
    }

    function renderPreview(cmapName) {
      const colors = colormaps[cmapName].colors;

      // Seismic data
      const sCanvas = document.getElementById('preview-seismic');
      const sCtx = sCanvas.getContext('2d');
      for (let y = 0; y < sCanvas.height; y++) {
        for (let x = 0; x < sCanvas.width; x++) {
          const t = x / sCanvas.width;
          const val = Math.sin(t * Math.PI * 8 + y * 0.05) * Math.exp(-t * 3);
          const norm = (val + 1) / 2;
          const [r, g, b] = interpolateCmap(colors, norm);
          sCtx.fillStyle = `rgb(${r},${g},${b})`;
          sCtx.fillRect(x, y, 1, 1);
        }
      }

      // Gradient
      const gCanvas = document.getElementById('preview-gradient');
      const gCtx = gCanvas.getContext('2d');
      for (let x = 0; x < gCanvas.width; x++) {
        const t = x / gCanvas.width;
        const [r, g, b] = interpolateCmap(colors, t);
        gCtx.fillStyle = `rgb(${r},${g},${b})`;
        gCtx.fillRect(x, 0, 1, gCanvas.height);
      }
    }

    // Build grid
    const grid = document.getElementById('cmap-grid');
    for (const [name, cmap] of Object.entries(colormaps)) {
      const card = document.createElement('div');
      card.className = `cmap-card${name === selectedCmap ? ' selected' : ''}`;
      card.innerHTML = `
        <div class="cmap-name">${name}</div>
        <div class="cmap-desc">${cmap.desc}</div>
        <div class="cmap-bar" style="background: ${gradientCSS(cmap.colors)};"></div>
      `;
      card.addEventListener('click', () => {
        document.querySelectorAll('.cmap-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedCmap = name;
        document.getElementById('selected-name').textContent = name;
        renderPreview(name);
      });
      grid.appendChild(card);
    }

    renderPreview(selectedCmap);
  </script>
</body>
</html>
