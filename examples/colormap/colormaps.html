<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIGVis — Colormaps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c14; --bg-card: #12121c; --border: rgba(255,255,255,0.06);
      --text: #e8eaed; --text-2: #8b8fa3; --text-3: #5c6078;
      --accent: #00d4aa; --accent-dim: rgba(0,212,170,0.08);
      --sans: 'Inter', sans-serif; --mono: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); }

    .topbar { display:flex; align-items:center; gap:12px; padding:0 24px; height:48px; background:var(--bg-card); border-bottom:1px solid var(--border); }
    .back { color:var(--accent); text-decoration:none; font-size:12px; font-family:var(--mono); }
    .topbar-title { font-size:14px; font-weight:600; }

    .container { max-width:1080px; margin:0 auto; padding:32px 24px; }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; margin-bottom:32px; }

    .cmap-card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:10px;
      padding:12px; cursor:pointer; transition:border-color 0.2s;
    }
    .cmap-card:hover { border-color:rgba(0,212,170,0.25); }
    .cmap-card.selected { border-color:var(--accent); background:var(--accent-dim); }

    .cmap-name { font-family:var(--mono); font-size:12px; font-weight:500; color:var(--text); margin-bottom:4px; }
    .cmap-desc { font-size:11px; color:var(--text-3); margin-bottom:8px; }
    .cmap-bar { height:14px; border-radius:4px; border:1px solid var(--border); }

    .preview {
      background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
      padding:24px;
    }
    .preview-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .preview-title { font-family:var(--mono); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-2); }
    .preview-name { font-family:var(--mono); font-size:13px; color:var(--accent); }

    .preview-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .preview-canvas { display:block; width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; }
    .preview-label { font-size:11px; color:var(--text-3); text-align:center; margin-top:8px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">← back</a>
    <span class="topbar-title">Colormaps</span>
  </div>

  <div class="container">
    <div class="grid" id="grid"></div>

    <div class="preview">
      <div class="preview-head">
        <span class="preview-title">Preview</span>
        <span class="preview-name" id="sel-name">petrel</span>
      </div>
      <div class="preview-grid">
        <div>
          <canvas class="preview-canvas" id="prev-seis" width="500" height="250"></canvas>
          <div class="preview-label">Seismic data</div>
        </div>
        <div>
          <canvas class="preview-canvas" id="prev-grad" width="500" height="50"></canvas>
          <div class="preview-label">Gradient</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const cmaps = {
      gray:    { c:[[0,0,0],[255,255,255]], d:'Standard grayscale' },
      gray_r:  { c:[[255,255,255],[0,0,0]], d:'Reversed grayscale' },
      petrel:  { c:[[0,0,255],[0,255,255],[0,255,0],[255,255,0],[255,0,0]], d:'Geophysical standard' },
      seismic: { c:[[0,0,178],[128,255,255],[255,255,255],[255,255,128],[178,0,0]], d:'Blue-white-red' },
      jet:     { c:[[0,0,128],[0,0,255],[0,255,255],[0,255,0],[255,255,0],[255,0,0],[128,0,0]], d:'Rainbow' },
      hot:     { c:[[0,0,0],[255,0,0],[255,255,0],[255,255,255]], d:'Black to white' },
      cool:    { c:[[0,255,255],[255,0,255]], d:'Cyan to magenta' },
      viridis: { c:[[68,1,84],[59,82,139],[33,145,140],[94,201,98],[253,231,37]], d:'Perceptually uniform' },
      spring:  { c:[[255,0,255],[255,255,0]], d:'Magenta to yellow' },
      summer:  { c:[[0,128,102],[255,255,102]], d:'Green to yellow' },
      autumn:  { c:[[255,0,0],[255,255,0]], d:'Red to yellow' },
      winter:  { c:[[0,0,255],[0,255,128]], d:'Blue to green' },
      bone:    { c:[[0,0,0],[128,128,192],[255,255,255]], d:'Bone-like' },
      copper:  { c:[[0,0,0],[255,199,127]], d:'Copper tones' },
      rainbow: { c:[[255,0,0],[255,255,0],[0,255,0],[0,255,255],[0,0,255],[255,0,255]], d:'Full rainbow' },
      terrain: { c:[[0,0,128],[0,128,0],[255,255,0],[128,0,0],[255,255,255]], d:'Terrain colors' },
    };

    let sel = 'petrel';

    function gradCSS(c) {
      return `linear-gradient(to right, ${c.map((v,i) => `rgb(${v.join(',')}) ${(i/(c.length-1)*100).toFixed(1)}%`).join(', ')})`;
    }

    function interp(c, t) {
      t = Math.max(0, Math.min(1, t));
      const i = t * (c.length - 1);
      const lo = Math.floor(i), f = i - lo;
      if (lo >= c.length - 1) return c[c.length - 1];
      return [
        Math.round(c[lo][0] + (c[lo+1][0]-c[lo][0])*f),
        Math.round(c[lo][1] + (c[lo+1][1]-c[lo][1])*f),
        Math.round(c[lo][2] + (c[lo+1][2]-c[lo][2])*f),
      ];
    }

    function renderPreview(name) {
      const c = cmaps[name].c;

      // Seismic
      const sc = document.getElementById('prev-seis');
      const sx = sc.getContext('2d');
      for (let y = 0; y < sc.height; y++) {
        for (let x = 0; x < sc.width; x++) {
          const t = x / sc.width;
          const v = Math.sin(t * Math.PI * 8 + y * 0.05) * Math.exp(-t * 3);
          const [r, g, b] = interp(c, (v+1)/2);
          sx.fillStyle = `rgb(${r},${g},${b})`;
          sx.fillRect(x, y, 1, 1);
        }
      }

      // Gradient
      const gc = document.getElementById('prev-grad');
      const gx = gc.getContext('2d');
      for (let x = 0; x < gc.width; x++) {
        const [r, g, b] = interp(c, x / gc.width);
        gx.fillStyle = `rgb(${r},${g},${b})`;
        gx.fillRect(x, 0, 1, gc.height);
      }
    }

    // Build grid
    const grid = document.getElementById('grid');
    for (const [name, cmap] of Object.entries(cmaps)) {
      const card = document.createElement('div');
      card.className = `cmap-card${name === sel ? ' selected' : ''}`;
      card.innerHTML = `
        <div class="cmap-name">${name}</div>
        <div class="cmap-desc">${cmap.d}</div>
        <div class="cmap-bar" style="background:${gradCSS(cmap.c)};"></div>
      `;
      card.addEventListener('click', () => {
        document.querySelectorAll('.cmap-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        sel = name;
        document.getElementById('sel-name').textContent = name;
        renderPreview(name);
      });
      grid.appendChild(card);
    }

    renderPreview(sel);
  </script>
</body>
</html>
